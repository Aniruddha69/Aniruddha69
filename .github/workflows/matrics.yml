name: GitHub Metrics Generator

on:
  # Schedule daily updates at midnight
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggers from the Actions tab
  workflow_dispatch:
  # (The 'push' trigger has been completely removed to stop the loop!)

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          
          # GitHub Personal Access Token (for fetching data)
          token: ${{ secrets.METRICS_TOKEN }}
          
          # Uses built-in token to write
          committer_token: ${{ secrets.GITHUB_TOKEN }}

          # 1. Base content for user
          base: header, activity, community, repositories, metadata
          
          # 2. Repositories traffic
          plugin_traffic: yes
          
          # 3. Repository licenses
          plugin_licenses: no
          
          # 4. Gists
          plugin_gists: yes
          
          # 5. Isometric commit calendar (full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 6. WakaTime
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os

      # -------------------------------------------------------------
      # NEW STEPS: Force the green square contribution
      # -------------------------------------------------------------
      
      # Checkout the repository to run Git commands
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # FIX: Use the built-in token here to prevent action looping
          token: ${{ secrets.GITHUB_TOKEN }}

      # Make an empty commit as YOU to trigger the contribution graph
      - name: Register contribution on GitHub graph
        run: |
          # Pull the new SVG commit that the metrics bot just created
          git pull origin ${{ github.ref_name }}
          
          # Configure Git to use your personal details
          git config user.email "107599986+Aniruddha69@users.noreply.github.com"
          git config user.name "Aniruddha69"
          
          # Create an empty commit and push it
          git commit --allow-empty -m "chore: sync daily metrics"
          git push
