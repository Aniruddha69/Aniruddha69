name: GitHub Metrics Generator

on:
  # Schedule daily updates at midnight
  schedule:
    - cron: "0 0 * * *"
  # Allow manual triggers from the Actions tab
  workflow_dispatch:
  # Run on every push to the main branch
  push:
    branches: ["main", "master"]

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate GitHub Metrics
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics.svg
          # GitHub Personal Access Token
          token: ${{ secrets.METRICS_TOKEN }}

          # 1. Base content for user
          base: header, activity, community, repositories, metadata
          
          # 2. Repositories traffic
          plugin_traffic: yes
          
          # 3. Repository licenses
          plugin_licenses: yes
          
          # 4. Gists
          plugin_gists: yes
          
          # 5. Isometric commit calendar (full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
          
          # 6. WakaTime
          plugin_wakatime: yes
          plugin_wakatime_token: ${{ secrets.WAKATIME_TOKEN }}
          plugin_wakatime_days: 365
          plugin_wakatime_sections: time, languages, languages-graphs, editors, os

      # -------------------------------------------------------------
      # NEW STEPS: Force the green square contribution
      # -------------------------------------------------------------
      
      # Checkout the repository to run Git commands
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.METRICS_TOKEN }}

      # Make an empty commit as YOU to trigger the contribution graph
      - name: Register contribution on GitHub graph
        run: |
          # Pull the new SVG commit that the metrics bot just created
          git pull origin ${{ github.ref_name }}
          
          # Configure Git to use YOUR personal details
          # IMPORTANT: Change the email and username below!
          git config user.email "YOUR_GITHUB_EMAIL@EXAMPLE.COM"
          git config user.name "YOUR_USERNAME"
          
          # Create an empty commit and push it
          git commit --allow-empty -m "chore: sync daily metrics"
          git push
